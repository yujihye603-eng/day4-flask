<!DOCTYPE html>
<html class="light" lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Be+Vietnam+Pro:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
    .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    body { background-color: #fbf9f5; }
    .textarea-ghost:focus {
        outline: none;
        box-shadow: none;
    }
</style>
<script>
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                "colors": {
                    "secondary": "#655d5a",
                    "surface-container": "#efeeea",
                    "primary-container": "#5d4037",
                    "surface-variant": "#e4e2de",
                    "on-primary": "#ffffff",
                    "on-background": "#1b1c1a",
                    "primary-fixed": "#ffdbd0",
                    "surface": "#fbf9f5",
                    "on-surface-variant": "#504441",
                    "primary": "#442a22",
                    "on-surface": "#1b1c1a",
                    "tertiary-fixed": "#ffdbce"
                },
                "spacing": {
                    "stack-md": "24px",
                    "margin-mobile": "20px",
                    "gutter": "24px",
                    "stack-lg": "48px",
                    "section-gap": "80px",
                    "stack-sm": "12px"
                },
                "fontFamily": {
                    "h3": ["Plus Jakarta Sans"],
                    "h1": ["Plus Jakarta Sans"],
                    "body-lg": ["Be Vietnam Pro"],
                    "body-md": ["Be Vietnam Pro"],
                    "h2": ["Plus Jakarta Sans"],
                    "label-sm": ["Be Vietnam Pro"]
                },
                "fontSize": {
                    "h3": ["24px", {"lineHeight": "1.3", "fontWeight": "600"}],
                    "h1": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                    "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
                    "h2": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "label-sm": ["14px", {"lineHeight": "1.0", "letterSpacing": "0.05em", "fontWeight": "500"}]
                }
            }
        }
    }
</script>
</head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col">

<!-- TopAppBar -->
<header class="bg-[#FDFCFB] shadow-[0_1px_2px_rgba(93,64,55,0.05)] border-b border-stone-200 sticky top-0 z-40">
    <div class="max-w-[1120px] mx-auto flex justify-between items-center px-6 h-16">
        <div class="flex items-center gap-8">
            <a href="{{ url_for('post_list') }}" class="text-xl font-semibold tracking-tighter text-[#5D4037] font-h2">Journal</a>
            <nav class="hidden md:flex items-center gap-6">
                <a class="text-stone-400 hover:text-[#5D4037] font-['Plus_Jakarta_Sans'] text-sm tracking-wide transition-all duration-300" href="{{ url_for('post_list') }}">Feed</a>
                <a class="text-[#5D4037] font-bold border-b-2 border-[#5D4037] pb-1 font-['Plus_Jakarta_Sans'] text-sm tracking-wide" href="{{ url_for('write_post') }}">Write</a>
            </nav>
        </div>
        <div class="flex items-center gap-4">
            <button class="material-symbols-outlined text-[#5D4037] hover:bg-stone-50 p-2 rounded-full transition-all duration-300" data-icon="search">search</button>
        </div>
    </div>
</header>

<!-- Main Content: Writing Canvas -->
<main class="flex-grow flex flex-col items-center py-section-gap px-margin-mobile">
    <div class="w-full max-w-3xl">

        <!-- Contextual Toolbar -->
        <div class="flex justify-between items-center mb-stack-lg border-b border-surface-variant pb-stack-sm">
            <div class="flex gap-4">
                <span class="flex items-center gap-2 text-secondary text-label-sm font-label-sm">
                    <span class="material-symbols-outlined text-[18px]" data-icon="edit_note">edit_note</span>
                    New Post
                </span>
            </div>
        </div>

        <form method="POST" action="{{ url_for('write_post') }}" class="flex flex-col gap-stack-md">
            <!-- Title Input -->
            <div class="group">
                <input
                    autocomplete="off"
                    class="w-full bg-transparent border-none p-0 text-h1 font-h1 placeholder:text-surface-variant focus:ring-0 text-primary"
                    placeholder="Post Title"
                    type="text"
                    name="title"
                    required
                />
                <div class="h-px bg-surface-variant w-0 group-focus-within:w-full transition-all duration-500"></div>
            </div>

            <!-- Content Area -->
            <div class="relative min-h-[500px]">
                <textarea
                    class="w-full h-full bg-transparent border-none p-0 mt-stack-md text-body-lg font-body-lg text-secondary placeholder:text-surface-variant/70 focus:ring-0 resize-none textarea-ghost leading-relaxed"
                    placeholder="Start writing your thoughts..."
                    rows="15"
                    name="content"
                    required
                ></textarea>
            </div>

            <!-- Submission Bar -->
            <div class="fixed bottom-24 md:bottom-12 left-1/2 -translate-x-1/2 w-full max-w-3xl px-margin-mobile flex justify-end">
                <div class="bg-[#FDFCFB]/80 backdrop-blur-md p-stack-sm rounded-full shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-surface-variant flex items-center gap-4">
                    <a href="{{ url_for('post_list') }}" class="px-6 py-3 rounded-full text-secondary hover:bg-surface-container transition-all font-label-sm text-label-sm">
                        Cancel
                    </a>
                    <button class="bg-primary text-on-primary px-8 py-3 rounded-full shadow-lg hover:bg-primary/90 active:scale-95 transition-all font-h3 text-body-md" type="submit">
                        Publish Post
                    </button>
                </div>
            </div>
        </form>
    </div>
</main>

<!-- Decorative Canvas Elements -->
<div class="fixed top-0 left-0 w-full h-full -z-10 pointer-events-none overflow-hidden opacity-30">
    <div class="absolute -top-[10%] -left-[5%] w-[400px] h-[400px] bg-primary-fixed blur-[120px] rounded-full"></div>
    <div class="absolute top-[60%] -right-[10%] w-[500px] h-[500px] bg-tertiary-fixed blur-[150px] rounded-full"></div>
</div>

</body></html>
